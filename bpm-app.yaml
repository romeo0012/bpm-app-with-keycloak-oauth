---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bpm-app
  namespace: camunda
  labels:
    app: bpm-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bpm-app
  template:
    metadata:
      labels:
        app: bpm-app
    spec:
      #imagePullSecrets:
      #  - name: ghcr-creds

      containers:
        - name: bpm-app
          image: ghcr.io/romeo0012/bpm-app:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 9090
              name: http

          env:
            - name: SPRING_CONFIG_LOCATION
              value: /config/
            - name: TRUSTSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bpm-app-secret
                  key: TRUSTSTORE_PASSWORD

            - name: JAVA_TOOL_OPTIONS
              value: >-
                -Djavax.net.ssl.trustStore=/app/truststore.jks
                -Djavax.net.ssl.trustStorePassword=$(TRUSTSTORE_PASSWORD)

          volumeMounts:
            - name: config-volume
              mountPath: /config

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"

      volumes:
        - name: config-volume
          configMap:
            name: bpm-app-config
---
apiVersion: v1
kind: Service
metadata:
  name: bpm-app
  namespace: camunda
  labels:
    app: bpm-app
spec:
  selector:
    app: bpm-app
  ports:
    - name: http
      port: 9090
      targetPort: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bpm-app
  namespace: camunda
  annotations:
    nginx.ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/configuration-snippet: |
      set $forwarded "proto=https;host=dev-kube.prg1paas.t-cloud.eu;port=443";
      more_set_input_headers "Forwarded: \"$forwarded\"";
    nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/proxy-buffering: 'off'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
    nginx.ingress.kubernetes.io/session-cookie-name: SRVGROUP
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/use-forwarded-headers: 'true'
  selfLink: /apis/networking.k8s.io/v1/namespaces/camunda/ingresses/bpm-app
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dev-kube.prg1paas.t-cloud.eu
  rules:
    - host: dev-kube.prg1paas.t-cloud.eu
      http:
        paths:
          - path: /camunda
            pathType: ImplementationSpecific
            backend:
              service:
                name: node414-dev-mgmt
                port:
                  number: 9090
          - path: /engine-rest
            pathType: ImplementationSpecific
            backend:
              service:
                name: node414-dev-mgmt
                port:
                  number: 9090
          - path: /oauth2
            pathType: ImplementationSpecific
            backend:
              service:
                name: node414-dev-mgmt
                port:
                  number: 9090
