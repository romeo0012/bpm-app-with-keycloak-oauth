---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bpm-app-config
  namespace: camunda
data:
  application.yaml: |
    spring:
      datasource:
        url: jdbc:postgresql://10.100.3.23:5432/camunda
        username: webadmin
        password: SH1HhZR7uf

      security:
        oauth2:
          client:
            registration:
              keycloak:
                provider: keycloak
                client-id: camunda
                client-secret: Q0bqK7FJ5eTZcPsHxipgGZukQv2OvB4A
                authorization-grant-type: authorization_code
                redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
                scope:
                  - openid
                  - profile
                  - email
            provider:
              keycloak:
                issuer-uri: https://dev-mgmt.prg1paas.t-cloud.eu/realms/camunda
                user-name-attribute: preferred_username
          resourceserver:
            jwt:
              issuer-uri: https://dev-mgmt.prg1paas.t-cloud.eu/realms/camunda

    server:
      port: 9090
      servlet:
        context-path: /
      forward-headers-strategy: native

    camunda:
      bpm:
        filter:
          create: All Tasks
        webapp:
          security:
            enabled: false

    plugin:
      identity:
        keycloak:
